<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#ff6600"/><stop offset="100%" stop-color="#ffaa33"/></linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.3"/></filter>
  </defs>
  <rect width="400" height="400" fill="url(#bg)" rx="20"/>
  <!-- Speaker body -->
  <rect x="130" y="80" width="140" height="230" rx="30" fill="#2c2c2e" filter="url(#shadow)"/>
  <!-- Speaker grille -->
  <circle cx="200" cy="160" r="40" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="2"/>
  <circle cx="200" cy="160" r="25" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1.5"/>
  <circle cx="200" cy="250" r="20" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1.5"/>
  <!-- Brand -->
  <text x="200" y="350" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-size="14" font-weight="600" font-family="system-ui">JBL</text>
  <text x="200" y="373" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="11" font-family="system-ui">JBL Flip 6 Black</text>
</svg>