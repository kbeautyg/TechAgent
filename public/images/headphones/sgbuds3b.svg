<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#1428a0"/><stop offset="100%" stop-color="#4a90d9"/></linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.3"/></filter>
  </defs>
  <rect width="400" height="400" fill="url(#bg)" rx="20"/>
  <!-- Case -->
  <rect x="120" y="100" width="160" height="120" rx="30" fill="#1a1a1a" filter="url(#shadow)"/>
  <!-- Case line -->
  <line x1="140" y1="160" x2="260" y2="160" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <!-- Left earbud -->
  <ellipse cx="165" cy="135" rx="18" ry="22" fill="#1a1a1a" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <!-- Right earbud -->
  <ellipse cx="235" cy="135" rx="18" ry="22" fill="#1a1a1a" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <!-- Stems -->
  <rect x="160" y="155" width="10" height="25" rx="4" fill="#1a1a1a" stroke="rgba(255,255,255,0.1)" stroke-width="0.5"/>
  <rect x="230" y="155" width="10" height="25" rx="4" fill="#1a1a1a" stroke="rgba(255,255,255,0.1)" stroke-width="0.5"/>
  <!-- Brand -->
  <text x="200" y="280" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-size="14" font-weight="600" font-family="system-ui">Samsung</text>
  <text x="200" y="303" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="11" font-family="system-ui">Samsung Galaxy Buds3 Black</text>
</svg>