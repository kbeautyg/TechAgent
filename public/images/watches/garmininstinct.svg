<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#007cc3"/><stop offset="100%" stop-color="#3399dd"/></linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.3"/></filter>
  </defs>
  <rect width="400" height="400" fill="url(#bg)" rx="20"/>
  <!-- Top band -->
  <rect x="165" y="50" width="70" height="80" rx="8" fill="#2c2c2e" filter="url(#shadow)"/>
  <!-- Watch body -->
  <rect x="145" y="120" width="110" height="130" rx="22" fill="#2c2c2e" filter="url(#shadow)"/>
  <!-- Screen -->
  <rect x="155" y="130" width="90" height="110" rx="16" fill="#1c1c1e"/>
  <!-- Watch face -->
  <circle cx="200" cy="185" r="35" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="200" y="180" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="20" font-family="system-ui">12:00</text>
  <text x="200" y="200" text-anchor="middle" fill="rgba(10,132,255,0.6)" font-size="10" font-family="system-ui">MON 1</text>
  <!-- Crown button -->
  <rect x="255" y="170" width="8" height="20" rx="3" fill="#2c2c2e"/>
  <!-- Bottom band -->
  <rect x="165" y="250" width="70" height="90" rx="8" fill="#2c2c2e"/>
  <!-- Brand -->
  <text x="200" y="370" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-size="14" font-weight="600" font-family="system-ui">Garmin</text>
</svg>