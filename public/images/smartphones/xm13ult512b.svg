<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#ff6900"/><stop offset="100%" stop-color="#ff9a3c"/></linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#1c1c1e"/><stop offset="100%" stop-color="#2c2c2e"/></linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.3"/></filter>
  </defs>
  <rect width="400" height="400" fill="url(#bg)" rx="20"/>
  <!-- Phone body -->
  <rect x="140" y="45" width="120" height="250" rx="18" fill="#1a1a1a" filter="url(#shadow)"/>
  <!-- Screen -->
  <rect x="147" y="58" width="106" height="225" rx="12" fill="url(#screen)"/>
  <!-- Dynamic Island / Notch -->
  <rect x="178" y="63" width="44" height="12" rx="6" fill="#1a1a1a"/>
  <!-- Screen content hint -->
  <circle cx="200" cy="155" r="25" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="2"/>
  <text x="200" y="162" text-anchor="middle" fill="rgba(255,255,255,0.15)" font-size="18" font-family="system-ui">●</text>
  <!-- Brand -->
  <text x="200" y="335" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-size="14" font-weight="600" font-family="system-ui, -apple-system, sans-serif">Xiaomi</text>
  <!-- Product name (truncated) -->
  <text x="200" y="358" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="11" font-family="system-ui">Xiaomi 13 Ultra 512GB Black</text>
  <text x="200" y="375" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="11" font-family="system-ui"></text>
</svg>