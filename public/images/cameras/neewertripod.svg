<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#555555"/><stop offset="100%" stop-color="#888888"/></linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.3"/></filter>
  </defs>
  <rect width="400" height="400" fill="url(#bg)" rx="20"/>
  <!-- Camera body -->
  <rect x="100" y="120" width="200" height="140" rx="12" fill="#2c2c2e" filter="url(#shadow)"/>
  <!-- Viewfinder bump -->
  <rect x="130" y="105" width="60" height="20" rx="4" fill="#2c2c2e"/>
  <!-- Lens -->
  <circle cx="200" cy="190" r="40" fill="#111" stroke="rgba(255,255,255,0.15)" stroke-width="3"/>
  <circle cx="200" cy="190" r="28" fill="#1a1a1a" stroke="rgba(255,255,255,0.1)" stroke-width="2"/>
  <circle cx="200" cy="190" r="15" fill="#222" stroke="rgba(100,149,237,0.3)" stroke-width="1"/>
  <!-- Flash -->
  <rect x="270" y="130" width="15" height="10" rx="2" fill="rgba(255,255,255,0.15)"/>
  <!-- Brand -->
  <text x="200" y="320" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-size="14" font-weight="600" font-family="system-ui">Neewer</text>
  <text x="200" y="343" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="11" font-family="system-ui">Neewer 75" Aluminum Alloy Tripod</text>
</svg>