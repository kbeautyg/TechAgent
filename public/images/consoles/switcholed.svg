<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#e4000f"/><stop offset="100%" stop-color="#ff4444"/></linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.3"/></filter>
  </defs>
  <rect width="400" height="400" fill="url(#bg)" rx="20"/>
  <!-- Switch body -->
  <rect x="70" y="110" width="260" height="160" rx="10" fill="#1c1c1e" filter="url(#shadow)"/>
  <!-- Screen -->
  <rect x="105" y="115" width="190" height="150" rx="4" fill="#2c2c2e"/>
  <!-- Left Joy-Con -->
  <rect x="70" y="110" width="40" height="160" rx="10" fill="#0ab9e6"/>
  <!-- Right Joy-Con -->
  <rect x="290" y="110" width="40" height="160" rx="10" fill="#ff3c28"/>
  <!-- Sticks -->
  <circle cx="90" cy="160" r="10" fill="rgba(0,0,0,0.3)"/>
  <circle cx="310" cy="220" r="10" fill="rgba(0,0,0,0.3)"/>
  <!-- Brand -->
  <text x="200" y="330" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-size="14" font-weight="600" font-family="system-ui">Nintendo</text>
  <text x="200" y="353" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="11" font-family="system-ui">Nintendo Switch OLED White</text>
</svg>