<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>TechAgent</title>
    <script>
      // GitHub Pages SPA redirect
      var path = window.location.pathname;
      var repo = '/TechAgent';
      if (path.startsWith(repo)) {
        var route = path.slice(repo.length);
        window.location.replace(repo + '/?route=' + encodeURIComponent(route));
      }
    </script>
  </head>
  <body></body>
</html>
