<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#555555"/><stop offset="100%" stop-color="#888888"/></linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.3"/></filter>
  </defs>
  <rect width="400" height="400" fill="url(#bg)" rx="20"/>
  <!-- Headband -->
  <path d="M120,200 Q120,90 200,80 Q280,90 280,200" fill="none" stroke="#2c2c2e" stroke-width="14" stroke-linecap="round" filter="url(#shadow)"/>
  <!-- Left ear cup -->
  <ellipse cx="120" cy="210" rx="35" ry="45" fill="#2c2c2e" filter="url(#shadow)"/>
  <ellipse cx="120" cy="210" rx="25" ry="35" fill="rgba(255,255,255,0.05)"/>
  <!-- Right ear cup -->
  <ellipse cx="280" cy="210" rx="35" ry="45" fill="#2c2c2e" filter="url(#shadow)"/>
  <ellipse cx="280" cy="210" rx="25" ry="35" fill="rgba(255,255,255,0.05)"/>
  <!-- Padding -->
  <ellipse cx="120" cy="210" rx="20" ry="28" fill="rgba(0,0,0,0.15)"/>
  <ellipse cx="280" cy="210" rx="20" ry="28" fill="rgba(0,0,0,0.15)"/>
  <!-- Brand -->
  <text x="200" y="320" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-size="14" font-weight="600" font-family="system-ui">Beyerdynamic</text>
  <text x="200" y="343" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="11" font-family="system-ui">Beyerdynamic DT 880 Pro Studio Head</text>
</svg>