<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#1d1d1f"/><stop offset="100%" stop-color="#86868b"/></linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#1c1c1e"/><stop offset="100%" stop-color="#2c2c2e"/></linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.3"/></filter>
  </defs>
  <rect width="400" height="400" fill="url(#bg)" rx="20"/>
  <!-- Tablet body -->
  <rect x="90" y="55" width="220" height="280" rx="16" fill="#2c2c2e" filter="url(#shadow)"/>
  <!-- Screen -->
  <rect x="100" y="65" width="200" height="260" rx="8" fill="url(#screen)"/>
  <!-- Camera dot -->
  <circle cx="200" cy="60" r="3" fill="#333"/>
  <!-- Brand -->
  <text x="200" y="370" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-size="14" font-weight="600" font-family="system-ui">Apple</text>
  <text x="200" y="390" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="11" font-family="system-ui">iPad 256GB</text>
</svg>