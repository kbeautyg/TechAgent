<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#1d1d1f"/><stop offset="100%" stop-color="#86868b"/></linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#1c1c1e"/><stop offset="100%" stop-color="#2c2c2e"/></linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="3" stdDeviation="6" flood-opacity="0.3"/></filter>
  </defs>
  <rect width="400" height="400" fill="url(#bg)" rx="20"/>
  <!-- Lid -->
  <rect x="70" y="60" width="260" height="175" rx="10" fill="#636366" filter="url(#shadow)"/>
  <!-- Screen -->
  <rect x="80" y="68" width="240" height="158" rx="4" fill="url(#screen)"/>
  <!-- Screen glow -->
  <rect x="100" y="90" width="200" height="4" rx="2" fill="rgba(255,255,255,0.06)"/>
  <rect x="100" y="102" width="160" height="4" rx="2" fill="rgba(255,255,255,0.04)"/>
  <rect x="100" y="114" width="180" height="4" rx="2" fill="rgba(255,255,255,0.04)"/>
  <!-- Base / keyboard -->
  <path d="M55,240 L70,235 L330,235 L345,240 L345,268 Q345,278 335,278 L65,278 Q55,278 55,268 Z" fill="#636366" filter="url(#shadow)"/>
  <!-- Trackpad -->
  <rect x="160" y="250" width="80" height="20" rx="4" fill="rgba(255,255,255,0.05)"/>
  <!-- Brand -->
  <text x="200" y="325" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-size="14" font-weight="600" font-family="system-ui">Apple</text>
  <text x="200" y="348" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="11" font-family="system-ui">MacBook Pro 14" M3 512GB</text>
  <text x="200" y="365" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="11" font-family="system-ui"></text>
</svg>