<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#ff6900"/><stop offset="100%" stop-color="#ff9a3c"/></linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.3"/></filter>
  </defs>
  <rect width="400" height="400" fill="url(#bg)" rx="20"/>
  <!-- Band body -->
  <rect x="160" y="60" width="80" height="280" rx="20" fill="#2c2c2e" filter="url(#shadow)"/>
  <!-- Screen -->
  <rect x="168" y="150" width="64" height="40" rx="8" fill="#1c1c1e"/>
  <text x="200" y="176" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-size="14" font-family="system-ui">12:00</text>
  <!-- Brand -->
  <text x="200" y="375" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-size="14" font-weight="600" font-family="system-ui">Xiaomi</text>
</svg>