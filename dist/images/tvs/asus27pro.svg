<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#000000"/><stop offset="100%" stop-color="#444444"/></linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0a0a1a"/><stop offset="100%" stop-color="#1a1a2e"/></linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.3"/></filter>
  </defs>
  <rect width="400" height="400" fill="url(#bg)" rx="20"/>
  <!-- TV bezel -->
  <rect x="50" y="70" width="300" height="190" rx="6" fill="#1a1a1a" filter="url(#shadow)"/>
  <!-- Screen -->
  <rect x="55" y="75" width="290" height="178" rx="2" fill="url(#screen)"/>
  <!-- Stand -->
  <rect x="175" y="260" width="50" height="30" fill="#1a1a1a"/>
  <rect x="140" y="285" width="120" height="8" rx="4" fill="#1a1a1a"/>
  <!-- Brand -->
  <text x="200" y="340" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-size="14" font-weight="600" font-family="system-ui">ASUS</text>
  <text x="200" y="363" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="11" font-family="system-ui">ASUS ProArt PA278QV 27" 100% sRGB</text>
</svg>